<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delta Schools – A Unified Portal</title>

  <!-- Arabic font (loaded alongside Sora/DM Sans in CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Compiled stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Scripts -->
  <script src="js/i18n.js" defer></script>
  <script src="js/main.js" defer></script>

</head>

<body>

  <!-- ═══════════════════════════════════════════════════════ NAV ══ -->
  <nav>
    <div class="nav-inner">

      <a class="logo" href="#">
        <div class="logo-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
        Delta Schools
      </a>

      <ul class="nav-links">
        <li><a href="https://delta-schools-das-production.up.railway.app/" target="_blank" data-i18n="nav.das"></a></li>
        <li><a href="https://delta-international-school.netlify.app/" target="_blank" data-i18n="nav.dils"></a></li>
        <li><a href="" target="_blank" data-i18n="nav.dmls"></a></li>
        <li>
          <button class="lang-toggle" data-lang-toggle>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" />
            </svg>
            عربي
          </button>
        </li>
        <li><a href="#cta" class="nav-cta" data-i18n="nav.cta"></a></li>
      </ul>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#das" data-i18n="nav.das"></a>
    <a href="#dils" data-i18n="nav.dils"></a>
    <a href="#dmls" data-i18n="nav.dmls"></a>
    <button class="lang-toggle" data-lang-toggle
      style="border:none;background:none;padding:10px 0;border-bottom:1px solid var(--border, #DDE4EF);font-size:1rem;font-weight:500;color:#3A4A5C;display:flex;align-items:center;gap:6px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" />
      </svg>
      عربي
    </button>
    <a href="#cta" class="m-cta" data-i18n="nav.cta"></a>
  </div>

  <!-- ═══════════════════════════════════════════════════════ HERO ══ -->
  <section class="hero">
    <div class="container">
      <div class="hero-inner">

        <div class="hero-copy">
          <div class="badge">
            <span class="badge-dot"></span>
            <span data-i18n="hero.badge"></span>
          </div>
          <h1 data-i18n="hero.headline"></h1>
          <p data-i18n="hero.deck"></p>
          <div class="hero-btns">
            <a href="#ecosystem" class="btn-primary" data-i18n="hero.btnExplore"></a>
            <a href="#cta" class="btn-outline" data-i18n="hero.btnDocs"></a>
          </div>
        </div>

        <div class="hero-visual">
          <div class="hero-card">
            <div class="hero-float-tag">
              <span class="float-dot"></span>
              <span data-i18n="hero.floatTag"></span>
            </div>
            <div class="hero-img-wrap">
              <div class="img-placeholder">
                <img
                  src="image/logo.jpg"
                  alt="Delta Schools Portal"
                  class="hero-img">
              </div>
            </div>
            <div class="hero-accent-bar"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ ECOSYSTEM ══ -->
  <section class="ecosystem" id="ecosystem">
    <div class="container">

      <div class="section-header reveal">
        <h2 data-i18n="ecosystem.title"></h2>
        <p data-i18n="ecosystem.deck"></p>
      </div>

      <div class="cards-grid">

        <!-- DAS -->
        <div class="school-card reveal reveal-delay-1" id="das">
          <div class="card-top">
            <div class="card-icon">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <ellipse cx="12" cy="5" rx="9" ry="3" />
                <path d="M3 5v14c0 1.657 4.03 3 9 3s9-1.343 9-3V5" />
                <path d="M3 12c0 1.657 4.03 3 9 3s9-1.343 9-3" />
              </svg>
            </div>
            <span class="card-label" data-i18n="ecosystem.das.label"></span>
          </div>
          <img class="card-img" src="image/DASImage.jpg" alt="DAS Image">
          <div class="card-body">
            <p data-i18n="ecosystem.das.body"></p>
            <a class="card-link" href="https://delta-schools-das-production.up.railway.app/" target="_blank">
              <span data-i18n="ecosystem.das.link"></span>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>

        <!-- DILS -->
        <div class="school-card reveal reveal-delay-2" id="dils">
          <div class="card-top">
            <div class="card-icon">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" />
                <path d="M8 21h8M12 17v4" />
              </svg>
            </div>
            <span class="card-label" data-i18n="ecosystem.dils.label"></span>
          </div>
          <img class="card-img" src="image/DILSImage.jpg" alt="DILS Image">
          <div class="card-body">
            <p data-i18n="ecosystem.dils.body"></p>
            <a class="card-link" href="https://delta-international-school.netlify.app/" target="_blank">
              <span data-i18n="ecosystem.dils.link"></span>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>

        <!-- DMLS -->
        <div class="school-card reveal reveal-delay-3" id="dmls">
          <div class="card-top">
            <div class="card-icon">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="8" height="8" rx="1" />
                <rect x="14" y="2" width="8" height="8" rx="1" />
                <rect x="2" y="14" width="8" height="8" rx="1" />
                <rect x="14" y="14" width="8" height="8" rx="1" />
              </svg>
            </div>
            <span class="card-label" data-i18n="ecosystem.dmls.label"></span>
          </div>
          <img class="card-img" src="image/DMLSImage.jpg" alt="DMLS Image">

          <div class="card-body">
            <p data-i18n="ecosystem.dmls.body"></p>
            <a class="card-link" href="" target="_blank">
              <span data-i18n="ecosystem.dmls.link"></span>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ═════════════════════════════════════════════════ GOVERNANCE ══ -->
  <section class="governance" id="governance">
    <div class="container">
      <div class="gov-inner">

        <div class="gov-visuals reveal">
          <div class="gov-img">
            <svg viewBox="0 0 200 280" width="200" height="280" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="280" fill="#0d1f3c" />
              <circle cx="100" cy="100" r="80" fill="none" stroke="#1A4FD8" stroke-width="1" opacity=".4" />
              <circle cx="100" cy="100" r="55" fill="none" stroke="#3B6EF5" stroke-width="1" opacity=".5" />
              <circle cx="100" cy="100" r="30" fill="#1A4FD8" opacity=".25" />
              <circle cx="155" cy="70" r="6" fill="#0ABDE3" />
              <circle cx="45" cy="70" r="5" fill="#3B6EF5" />
              <circle cx="100" cy="175" r="5" fill="#1A4FD8" />
              <line x1="100" y1="100" x2="155" y2="70" stroke="#0ABDE3" stroke-width="1" opacity=".7" />
              <line x1="100" y1="100" x2="45" y2="70" stroke="#3B6EF5" stroke-width="1" opacity=".7" />
              <line x1="100" y1="100" x2="100" y2="175" stroke="#1A4FD8" stroke-width="1" opacity=".7" />
              <rect x="30" y="210" width="140" height="8" rx="3" fill="#1A4FD8" opacity=".4" />
              <rect x="50" y="226" width="100" height="6" rx="3" fill="#3B6EF5" opacity=".3" />
              <rect x="40" y="240" width="120" height="6" rx="3" fill="#1A4FD8" opacity=".25" />
            </svg>
          </div>
          <div class="gov-img">
            <svg viewBox="0 0 160 130" width="160" height="130" xmlns="http://www.w3.org/2000/svg">
              <rect width="160" height="130" fill="#e8effe" />
              <circle cx="80" cy="55" r="35" fill="white" stroke="#c3d4f7" stroke-width="2" />
              <circle cx="80" cy="55" r="20" fill="#1A4FD8" opacity=".15" />
              <circle cx="80" cy="55" r="8" fill="#1A4FD8" />
              <rect x="20" y="100" width="120" height="8" rx="3" fill="#b0c4e8" />
              <rect x="40" y="114" width="80" height="6" rx="3" fill="#c8d8f0" />
            </svg>
          </div>
          <div class="gov-img">
            <svg viewBox="0 0 160 130" width="160" height="130" xmlns="http://www.w3.org/2000/svg">
              <rect width="160" height="130" fill="#0a1628" />
              <rect x="20" y="20" width="120" height="90" rx="6" fill="#111d35" stroke="#1A4FD8" stroke-width="1" />
              <rect x="30" y="32" width="100" height="10" rx="2" fill="#1A4FD8" opacity=".5" />
              <rect x="30" y="48" width="70" height="8" rx="2" fill="#3B6EF5" opacity=".4" />
              <rect x="30" y="62" width="90" height="8" rx="2" fill="#1A4FD8" opacity=".35" />
              <rect x="30" y="82" width="12" height="18" rx="1" fill="#1A4FD8" opacity=".7" />
              <rect x="48" y="72" width="12" height="28" rx="1" fill="#3B6EF5" opacity=".7" />
              <rect x="66" y="76" width="12" height="24" rx="1" fill="#0ABDE3" opacity=".7" />
              <rect x="84" y="66" width="12" height="34" rx="1" fill="#1A4FD8" opacity=".7" />
              <rect x="102" y="78" width="12" height="22" rx="1" fill="#3B6EF5" opacity=".7" />
            </svg>
          </div>
        </div>

        <div class="gov-copy reveal">
          <h2 data-i18n="governance.title"></h2>
          <p data-i18n="governance.body"></p>
          <ul class="check-list">
            <li>
              <div class="check-icon">
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path d="M20 6L9 17l-5-5" />
                </svg>
              </div>
              <span data-i18n="governance.check1"></span>
            </li>
            <li>
              <div class="check-icon">
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path d="M20 6L9 17l-5-5" />
                </svg>
              </div>
              <span data-i18n="governance.check2"></span>
            </li>
            <li>
              <div class="check-icon">
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path d="M20 6L9 17l-5-5" />
                </svg>
              </div>
              <span data-i18n="governance.check3"></span>
            </li>
          </ul>
          <a href="#ecosystem" class="btn-outline" data-i18n="governance.btnSpecs"></a>
        </div>

      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════ CTA ══ -->
  <section class="cta-banner" id="cta">
    <div class="container">
      <h2 data-i18n="cta.headline"></h2>
      <p data-i18n="cta.deck"></p>
      <form class="cta-form" id="registerForm">
        <input type="text" data-i18n-placeholder="cta.placeholderFullName" id="fullName" />
        <input type="email" data-i18n-placeholder="cta.placeholderEmail" id="email" />
        <input type="tel" data-i18n-placeholder="cta.placeholderPhone" id="phone" />
        <button type="submit" data-i18n="cta.btn"></button>
      </form>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════ FOOTER ══ -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span data-i18n="footer.brand"></span>
          <span data-i18n="footer.copyright"></span>
        </div>
      </div>
    </div>
  </footer>
  <!-- EmailJS Configuration Don't Touch -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</body>

</html>
